<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DashCam 1v1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; height: 100vh; }

    
    
    .header {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px;
      background: #16213e;
    }
    .player-label {
      color: white;
      font-size: 1.4rem;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }
    #p1-label { color: #4fc3f7; }
    #p2-label { color: #ef5350; }

    .games {
      display: flex;
      flex: 1;
      gap: 4px;
    }
    .game-wrapper {
      flex: 1;
      position: relative;
      border: 3px solid transparent;
    }
    .game-wrapper.p1 { border-color: #4fc3f7; }
    .game-wrapper.p2 { border-color: #ef5350; }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* waiting overlay */
    .waiting {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.2rem;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="player-label p1" id="p1-label">🟦 Player 1</div>
    <div style="color:white; font-size: 1rem; font-family: Arial;">vs</div>
    <div class="player-label p2" id="p2-label">🟥 Player 2</div>
  </div>

  <!-- Countdown overlay -->
  <div id="countdown" style="
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
  ">
    <div id="countdown-title" style="font-size: 1.2rem; color: #9aa0b4;">Both players connected!</div>
    <div id="countdown-number" style="font-size: 10rem; font-weight: 900; line-height: 1;"></div>
    <div id="countdown-sub" style="font-size: 1.1rem; color: #9aa0b4;"></div>
  </div>

  <div id="win-screen" style="
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    cursor: pointer;
  ">
    <div id="win-title" style="font-size: 5rem; font-weight: 900;"></div>
    <div id="win-sub" style="font-size: 1.2rem; color: #9aa0b4;"></div>
  </div>

  <div class="games">
    <div class="game-wrapper p1">
      <iframe id="game-p1" src="game.html"></iframe>
      <div class="waiting" id="wait-p1">Waiting for Player 1...</div>
    </div>
    <div class="game-wrapper p2">
      <iframe id="game-p2" src="game.html"></iframe>
      <div class="waiting" id="wait-p2">Waiting for Player 2...</div>
    </div>
  </div>

  <script>
    var WS_URL = location.hostname === "localhost"
    ? "ws://localhost:8000"
    : "wss://dashcam-production.up.railway.app"

  var connectedPlayers = { p1: false, p2: false }
  var readyPlayers = { p1: false, p2: false }
  var gameStarted = false
  var ws

  function setWaiting(player, waiting) {
    connectedPlayers[player] = !waiting
    var el = document.getElementById("wait-" + player)
    if (el) el.style.display = waiting ? "flex" : "none"
  }

  function showReadyScreen() {
    var overlay = document.getElementById("countdown")
    var title = document.getElementById("countdown-title")
    var num = document.getElementById("countdown-number")
    var sub = document.getElementById("countdown-sub")
    overlay.style.display = "flex"
    title.textContent = "Both players connected!"
    num.textContent = "🎮"
    sub.textContent = "Press any button to ready up"
  }

  function updateReadyScreen() {
    var num = document.getElementById("countdown-number")
    var sub = document.getElementById("countdown-sub")
    if (readyPlayers.p1 && readyPlayers.p2) {
      startCountdown()
    } else if (readyPlayers.p1) {
      num.textContent = "🟦"
      sub.textContent = "Player 1 is ready — waiting for Player 2..."
    } else if (readyPlayers.p2) {
      num.textContent = "🟥"
      sub.textContent = "Player 2 is ready — waiting for Player 1..."
    }
  }

  function autoStartGame(iframe) {
    if (!iframe || !iframe.contentWindow) return
    // send a click and space press to dismiss any start screen
    iframe.contentWindow.postMessage({ action: "press", key: "space" }, "*")
    setTimeout(function() {
      iframe.contentWindow.postMessage({ action: "release", key: "space" }, "*")
    }, 100)
  }

  function startCountdown() {
    var title = document.getElementById("countdown-title")
    var num = document.getElementById("countdown-number")
    var sub = document.getElementById("countdown-sub")
    title.textContent = "Get ready!"
    sub.textContent = ""
    num.style.color = "white"
    var count = 3
    num.textContent = count
    var interval = setInterval(function() {
      count--
      if (count === 0) {
        num.textContent = "GO!"
        num.style.color = "#4caf50"
      } else if (count < 0) {
        clearInterval(interval)
        document.getElementById("countdown").style.display = "none"
        gameStarted = true
        // auto-click through both game iframes
        autoStartGame(document.getElementById("game-p1"))
        autoStartGame(document.getElementById("game-p2"))
      } else {
        num.textContent = count
      }
    }, 1000)
  }

  function connect() {
    ws = new WebSocket(WS_URL)

    ws.onopen = function () {
      console.log("[1v1] connected to relay — registering as screen")
      ws.send(JSON.stringify({ type: "register", role: "screen" }))
    }

    ws.onmessage = function (event) {
      var data
      try { data = JSON.parse(event.data) } catch (e) { return }

      if (data.type === "state") {
        setWaiting("p1", data.players.indexOf("p1") === -1)
        setWaiting("p2", data.players.indexOf("p2") === -1)
        if (connectedPlayers.p1 && connectedPlayers.p2) showReadyScreen()

      } else if (data.type === "player_connected") {
        setWaiting(data.player, false)
        console.log("[1v1]", data.player, "connected")
        if (connectedPlayers.p1 && connectedPlayers.p2) showReadyScreen()

      } else if (data.type === "player_disconnected") {
        setWaiting(data.player, true)
        readyPlayers = { p1: false, p2: false }
        gameStarted = false
        document.getElementById("countdown").style.display = "none"
        console.log("[1v1]", data.player, "disconnected")

      } else if (data.type === "input") {
        if (!gameStarted) {
          if (!readyPlayers[data.player]) {
            readyPlayers[data.player] = true
            updateReadyScreen()
          }
          return
        }
        var iframe = data.player === "p1"
          ? document.getElementById("game-p1")
          : document.getElementById("game-p2")
        if (iframe && iframe.contentWindow) {
          iframe.contentWindow.postMessage({ action: data.action, key: data.key }, "*")
        }
      }
    }

    ws.onclose = function () {
      console.warn("[1v1] relay closed — reconnecting in 1.5s")
      setTimeout(connect, 1500)
    }
    ws.onerror = function () { try { ws.close() } catch (e) {} }
  }

  var ws
  var winner = null

  window.addEventListener("message", function(event) {
    if (!event.data || event.data.type !== "game_over") return
    
    // figure out which iframe sent this
    var p1Frame = document.getElementById("game-p1")
    var p2Frame = document.getElementById("game-p2")
    
    var loser = null
    if (event.source === p1Frame.contentWindow) loser = "p1"
    if (event.source === p2Frame.contentWindow) loser = "p2"
    if (!loser || winner) return // already have a winner
    
    winner = loser === "p1" ? "p2" : "p1"
    showWinScreen(winner)
  })

  function showWinScreen(player) {
    var overlay = document.getElementById("win-screen")
    var title = document.getElementById("win-title")
    var sub = document.getElementById("win-sub")
    overlay.style.display = "flex"
    if (player === "p1") {
      title.textContent = "🟦 Player 1 Wins!"
      title.style.color = "#4fc3f7"
    } else {
      title.textContent = "🟥 Player 2 Wins!"
      title.style.color = "#ef5350"
    }
    sub.textContent = "Tap anywhere to play again"
    overlay.addEventListener("click", function() {
      winner = null
      overlay.style.display = "none"
      gameStarted = false
      readyPlayers = { p1: false, p2: false }
      // reload both iframes to restart the games
      document.getElementById("game-p1").src = "game.html"
      document.getElementById("game-p2").src = "game.html"
      // show waiting overlays again
      document.getElementById("wait-p1").style.display = "flex"
      document.getElementById("wait-p2").style.display = "flex"
      connectedPlayers = { p1: false, p2: false }
    }, { once: true })
  }

  connect()

  window.addEventListener("message", function(event) {
    if (!event.data || event.data.type !== "game_over") return

    var p1Frame = document.getElementById("game-p1")
    var p2Frame = document.getElementById("game-p2")

    var loser = null
    if (event.source === p1Frame.contentWindow) loser = "p1"
    if (event.source === p2Frame.contentWindow) loser = "p2"
    if (!loser || winner) return

    winner = loser === "p1" ? "p2" : "p1"
    var loserScore = event.data.finalScore || 0
    showWinScreen(winner, loserScore)
  })

  function showWinScreen(player, loserScore) {
    var overlay = document.getElementById("win-screen")
    var title = document.getElementById("win-title")
    var sub = document.getElementById("win-sub")
    overlay.style.display = "flex"
    if (player === "p1") {
      title.textContent = "🟦 Player 1 Wins!"
      title.style.color = "#4fc3f7"
    } else {
      title.textContent = "🟥 Player 2 Wins!"
      title.style.color = "#ef5350"
    }
    sub.textContent = "Loser scored: " + (loserScore || 0)
    overlay.addEventListener("click", function() {
      winner = null
      overlay.style.display = "none"
      gameStarted = false
      readyPlayers = { p1: false, p2: false }
      connectedPlayers = { p1: false, p2: false }
      document.getElementById("game-p1").src = "game.html"
      document.getElementById("game-p2").src = "game.html"
      document.getElementById("wait-p1").style.display = "flex"
      document.getElementById("wait-p2").style.display = "flex"
    }, { once: true })
  }
  </script>

</body>
</html>
