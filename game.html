<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Subway Surfers: San Francisco</title>
    <link rel="icon" href="img/FirstAvatar.png" />
    <link rel="stylesheet" href="subway-ui.css" />
    <script type="text/javascript" src="4399.z.js"></script>
    <script>
      window.config = {
        loader: "unity",
        debug: false,
        maxRatio: 16 / 9,
        minRatio: 9 / 16,
        title: "Subway Surfers: San Francisco",
        unityVersion: "2019.4.18f1",
        unityWebglBuildUrl: "SanFrancisco.json",
        fileSize: 35,
        cachedDecompressedFileSizes: {
          "SanFrancisco.asm.code.unityweb": 9077143,
          "SanFrancisco.asm.framework.unityweb": 86369,
          "SanFrancisco.asm.memory.unityweb": 951447,
          "SanFrancisco.data.unityweb": 18323917,
          "SanFrancisco.wasm.code.unityweb": 7279617,
          "SanFrancisco.wasm.framework.unityweb": 90693,
        },
      };
    </script>
  </head>
  <body>
    <script src="subway-bridge.js"></script>
    <script src="loader.js"></script>
    <script>
      (function () {
        var KEY_MAP = {
          left:  37,
          up:    38,
          right: 39,
          down:  40,
          space: 32,
          jump:  32,
          a:     65,
          d:     68,
          w:     87,
          s:     83,
        };

        function getCanvas() {
          return document.querySelector("#game canvas")
              || document.querySelector("canvas");
        }

        function dispatchKey(keyName, type) {
          // Watch for game over by polling the canvas for Unity's game over state
          var gameOverDetected = false
          var lastScore = -1
          var stuckFrames = 0

          setInterval(function() {
            if (gameOverDetected) return
            
            // Look for game over text in the DOM (Unity WebGL injects this)
            var allText = document.body.innerText
            if (
              allText.indexOf("SCORE") !== -1 && 
              allText.indexOf("HIGH SCORE") !== -1 &&
              allText.indexOf("Play Again") !== -1
            ) {
              gameOverDetected = true
              // Tell 1v1.html this player died
              window.parent.postMessage({ type: "game_over" }, "*")
            }
          }, 500)

          var canvas = getCanvas();
          if (!canvas) return;

          var keyCode = KEY_MAP[keyName];
          if (keyCode === undefined) {
            console.warn("[game] Unknown key:", keyName);
            return;
          }

          var code = "Key" + String.fromCharCode(keyCode).toUpperCase();
          canvas.dispatchEvent(new KeyboardEvent(type, {
            keyCode:    keyCode,
            which:      keyCode,
            code:       code,
            key:        keyName,
            bubbles:    true,
            cancelable: true,
          }));
        }

        // Listen for postMessage from 1v1.html
        window.addEventListener("message", function(event) {
          var msg = event.data;
          if (!msg || !msg.key) return;
          if (msg.action === "press")   dispatchKey(msg.key, "keydown");
          if (msg.action === "release") dispatchKey(msg.key, "keyup");
        });

        // When the run ends, notify 1v1.html with the final score
        window.addEventListener("subway:gameover", function(event) {
          window.parent.postMessage({
            type: "game_over",
            finalScore: event.detail.finalScore,
            bestScore: event.detail.bestScore
          }, "*")
        })

      })();
    </script>
  </body>
</html>
