<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-first: fill the screen, disable pinch/double-tap zoom. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>DashCam Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      background: #12121f;
      color: #fff;
      display: flex;
      flex-direction: column;
      touch-action: none; /* no scroll/zoom from gestures on the controls */
    }

    /* ---------- Lobby ---------- */
    #lobby { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px; padding: 24px; }
    #lobby h1 { font-size: 1.6rem; letter-spacing: 0.5px; }
    #lobby .sub { color: #9aa0b4; font-size: 0.95rem; text-align: center; margin-top: -14px; }
    .join-buttons { display: flex; gap: 20px; width: 100%; max-width: 460px; }
    .join {
      flex: 1; aspect-ratio: 1 / 1; border: none; border-radius: 22px; color: #fff;
      font-size: 1.4rem; font-weight: 800; cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: transform 0.08s ease;
    }
    .join .num { font-size: 3rem; line-height: 1; }
    .join:active { transform: scale(0.96); }
    .join.p1 { background: linear-gradient(160deg, #4fc3f7, #1565c0); }
    .join.p2 { background: linear-gradient(160deg, #ef5350, #b71c1c); }
    #lobby-msg { color: #ffb74d; min-height: 1.2em; font-size: 0.9rem; text-align: center; }

    /* ---------- Controller pad ---------- */
    #pad { flex: 1; display: none; flex-direction: column; }
    #pad.show { display: flex; }
    .pad-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; font-weight: 800; font-size: 1.15rem;
    }
    .pad-header .dot { width: 12px; height: 12px; border-radius: 50%; background: #f44336; display: inline-block; margin-right: 8px; vertical-align: middle; }
    .pad-header .dot.on { background: #4caf50; }
    .pad-header .leave { background: rgba(255,255,255,0.12); border: none; color: #fff; padding: 8px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; }

    .grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; padding: 12px; }
    .ctl {
      border: none; border-radius: 20px; color: #fff; font-size: 1.5rem; font-weight: 800;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.08); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.06);
      touch-action: none; cursor: pointer; transition: transform 0.05s ease, background 0.05s ease;
    }
    .ctl .glyph { font-size: 3rem; line-height: 1; }
    .ctl.held { transform: scale(0.97); background: rgba(255,255,255,0.2); }

    /* Player theming applied to <body data-player="p1|p2"> */
    body[data-player="p1"] .pad-header { color: #4fc3f7; }
    body[data-player="p1"] .ctl { box-shadow: inset 0 0 0 2px #4fc3f733; }
    body[data-player="p1"] .ctl.held { background: #4fc3f755; }
    body[data-player="p2"] .pad-header { color: #ef5350; }
    body[data-player="p2"] .ctl { box-shadow: inset 0 0 0 2px #ef535033; }
    body[data-player="p2"] .ctl.held { background: #ef535055; }

    .status { padding: 8px 18px 14px; text-align: center; color: #9aa0b4; font-size: 0.85rem; min-height: 1.4em; }
  </style>
</head>
<body>
  <!-- Lobby: choose which player this phone controls -->
  <section id="lobby">
    <h1>🎮 DashCam Controller</h1>
    <p class="sub">Pick your side. Each phone controls one player.</p>
    <div class="join-buttons">
      <button class="join p1" onclick="join('p1')"><span class="num">1</span>Player&nbsp;1</button>
      <button class="join p2" onclick="join('p2')"><span class="num">2</span>Player&nbsp;2</button>
    </div>
    <div id="lobby-msg"></div>
  </section>

  <!-- Controller pad: shown after the server confirms the player slot -->
  <section id="pad">
    <div class="pad-header">
      <span><span class="dot" id="conn-dot"></span><span id="player-label">Player</span></span>
      <button class="leave" onclick="leave()">Leave</button>
    </div>
    <div class="grid">
      <button class="ctl" data-key="left"><span class="glyph">◀</span>LEFT</button>
      <button class="ctl" data-key="right"><span class="glyph">▶</span>RIGHT</button>
      <button class="ctl" data-key="up"><span class="glyph">▲</span>JUMP</button>
      <button class="ctl" data-key="down"><span class="glyph">▼</span>ROLL</button>
    </div>
    <div class="status" id="status">Connecting…</div>
  </section>

  <script>
    // ---- config -----------------------------------------------------------
    // The page is served from the computer on :8000; the relay is on :8765.
    var WS_HOST = location.hostname || "localhost";
    var WS_PORT = 8765;
    var WS_URL = "ws://" + WS_HOST + ":" + WS_PORT;
    var RECONNECT_MS = 1500;

    // LEFT/RIGHT = lane change, JUMP = up arrow, ROLL = down arrow.
    // (game.html maps these names to Unity key codes.)

    var ws = null;
    var chosenPlayer = null;   // "p1" | "p2" once the user picks
    var assignedPlayer = null; // confirmed by the server
    var reconnectTimer = null;
    var manualLeave = false;

    var $ = function (id) { return document.getElementById(id); };

    function setStatus(text) { $("status").textContent = text; }
    function setLobbyMsg(text) { $("lobby-msg").textContent = text || ""; }

    function showLobby() {
      $("pad").classList.remove("show");
      $("lobby").style.display = "flex";
      document.body.removeAttribute("data-player");
    }

    function showPad(player) {
      assignedPlayer = player;
      document.body.setAttribute("data-player", player);
      $("player-label").textContent = player === "p1" ? "🟦 Player 1" : "🟥 Player 2";
      $("lobby").style.display = "none";
      $("pad").classList.add("show");
    }

    function setConn(connected) {
      $("conn-dot").classList.toggle("on", !!connected);
    }

    // ---- networking -------------------------------------------------------
    function join(player) {
      chosenPlayer = player;
      manualLeave = false;
      setLobbyMsg("");
      connect();
    }

    function connect() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

      setStatus("Connecting to " + WS_URL + " …");
      try {
        ws = new WebSocket(WS_URL);
      } catch (e) {
        setLobbyMsg("Could not open socket: " + e.message);
        return;
      }

      ws.onopen = function () {
        setConn(true);
        ws.send(JSON.stringify({ type: "register", role: "controller", player: chosenPlayer }));
        setStatus("Joining as " + chosenPlayer + " …");
      };

      ws.onmessage = function (event) {
        var msg;
        try { msg = JSON.parse(event.data); } catch (e) { return; }

        if (msg.type === "assign") {
          showPad(msg.player);
          setStatus("You are " + (msg.player === "p1" ? "Player 1" : "Player 2") + ". Go!");
        } else if (msg.type === "error") {
          if (msg.reason === "slot_taken") {
            setLobbyMsg((msg.player === "p1" ? "Player 1" : "Player 2") + " is already taken — pick the other one.");
          } else if (msg.reason === "game_full") {
            setLobbyMsg("Game is full (two players already connected).");
          } else {
            setLobbyMsg("Server error: " + (msg.reason || "unknown"));
          }
          // Rejected: don't auto-reconnect; return to the lobby.
          manualLeave = true;
          assignedPlayer = null;
          if (ws) ws.close();
          showLobby();
        }
        // player_connected / player_disconnected are informational here.
      };

      ws.onclose = function () {
        setConn(false);
        ws = null;
        if (manualLeave) return;
        if (assignedPlayer) {
          setStatus("Disconnected — reconnecting…");
          reconnectTimer = setTimeout(connect, RECONNECT_MS);
        }
      };

      ws.onerror = function () { try { ws.close(); } catch (e) {} };
    }

    function leave() {
      manualLeave = true;
      assignedPlayer = null;
      chosenPlayer = null;
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      if (ws) { try { ws.close(); } catch (e) {} ws = null; }
      setLobbyMsg("");
      showLobby();
    }

    // ---- input ------------------------------------------------------------
    function press(key) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ action: "press", key: key }));
    }
    function release(key) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ action: "release", key: key }));
    }

    // Pointer events cover touch + mouse uniformly (no 300ms / double-fire).
    document.querySelectorAll(".ctl").forEach(function (btn) {
      var key = btn.getAttribute("data-key");
      var down = false;
      var start = function (e) {
        e.preventDefault();
        if (down) return;
        down = true;
        btn.classList.add("held");
        press(key);
      };
      var end = function (e) {
        if (e) e.preventDefault();
        if (!down) return;
        down = false;
        btn.classList.remove("held");
        release(key);
      };
      btn.addEventListener("pointerdown", start);
      btn.addEventListener("pointerup", end);
      btn.addEventListener("pointercancel", end);
      btn.addEventListener("pointerleave", end);
    });

    // Keyboard fallback for desktop testing.
    var KEYMAP = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down", a: "left", d: "right", w: "up", s: "down", " ": "up" };
    document.addEventListener("keydown", function (e) {
      if (e.repeat) return;
      var k = KEYMAP[e.key];
      if (!k) return;
      e.preventDefault();
      press(k);
      var btn = document.querySelector('.ctl[data-key="' + k + '"]');
      if (btn) btn.classList.add("held");
    });
    document.addEventListener("keyup", function (e) {
      var k = KEYMAP[e.key];
      if (!k) return;
      e.preventDefault();
      release(k);
      var btn = document.querySelector('.ctl[data-key="' + k + '"]');
      if (btn) btn.classList.remove("held");
    });

    // Optional deep link: controller.html?p=1 or ?p=2 auto-joins.
    (function () {
      var p = new URLSearchParams(location.search).get("p");
      if (p === "1" || p === "2") join("p" + p);
    })();
  </script>
</body>
</html>
